# Global settings

## mouse
set -g mouse on

## Prefer terminal clipboard integration (OSC52) when available.
set -s set-clipboard on

## Change default prefix
unbind C-b
set -g prefix C-j

## <Prefix> <Prefix> -> <Prefix>
bind C-j send-prefix

## Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded!"

## Window split
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

## Focus pane like vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

## Resize pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

## Copy mode like vim
set-window-option -g mode-keys vi

## Start copy selection by v
bind -T copy-mode-vi v send-keys -X begin-selection

## Copy like vim
# Choose clipboard program by availability:
# macOS: pbcopy, Wayland: wl-copy, X11: xclip
set -g @clipboard_copy_command 'xclip -in -selection clipboard'
if-shell 'command -v wl-copy >/dev/null 2>&1' \
  'set -g @clipboard_copy_command "wl-copy"'
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'set -g @clipboard_copy_command "pbcopy"'
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@clipboard_copy_command}"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@clipboard_copy_command}"

bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi Escape send-keys -X clear-selection

## Launch lazygit
bind g popup -w90% -h90% -d '#{pane_current_path}' -E lazygit

## Show tree
bind -n M-a choose-tree
bind -n M-w choose-tree -w

## Session
bind -n M-C-c new-session
bind -n M-C-l switch-client -n
bind -n M-C-h switch-client -p

## Window
bind c new-window -c "#{pane_current_path}"
bind -r Tab  next-window
bind -r BTab previous-window
