# Global settings

## mouse
set -g mouse on

## Prefer terminal clipboard integration (OSC52) when available.
set -s set-clipboard on

## Change default prefix
unbind C-b
set -g prefix C-j

## <Prefix> <Prefix> -> <Prefix>
bind -N "Send Ctrl-j to the current pane" C-j send-prefix

## Reload config
bind -N "Reload tmux config and refresh help note" r run-shell 'sh -lc "if [ -x \"$HOME/.nix-profile/bin/devbase-config\" ]; then \"$HOME/.nix-profile/bin/devbase-config\" sync-note >/dev/null 2>&1; elif [ -x \"/nix/var/nix/profiles/default/bin/devbase-config\" ]; then /nix/var/nix/profiles/default/bin/devbase-config sync-note >/dev/null 2>&1; fi"' \; source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded!"
unbind g
bind -N "Open personal help note" g popup -w90% -h90% -d "#{pane_current_path}" -E 'sh -lc "if [ -x \"$HOME/.nix-profile/bin/devbase-config\" ]; then exec \"$HOME/.nix-profile/bin/devbase-config\" note-ui; elif [ -x \"/nix/var/nix/profiles/default/bin/devbase-config\" ]; then exec /nix/var/nix/profiles/default/bin/devbase-config note-ui; else printf \"devbase-config not found\"; sleep 2; fi"'

## Window split
bind -N "Split pane vertically" s split-window -v -c "#{pane_current_path}"
bind -N "Split pane horizontally" v split-window -h -c "#{pane_current_path}"

## Focus pane like vim
bind -N "Move focus left" h select-pane -L
bind -N "Move focus down" j select-pane -D
bind -N "Move focus up" k select-pane -U
bind -N "Move focus right" l select-pane -R

## Resize pane
bind -N "Resize pane left" -r H resize-pane -L 5
bind -N "Resize pane down" -r J resize-pane -D 5
bind -N "Resize pane up" -r K resize-pane -U 5
bind -N "Resize pane right" -r L resize-pane -R 5

## Copy mode like vim
set-window-option -g mode-keys vi

## Start copy selection by v
bind -N "Start selection" -T copy-mode-vi v send-keys -X begin-selection

## Copy like vim
# Choose clipboard program by availability:
# macOS: pbcopy, Wayland: wl-copy, X11: xclip
set -g @clipboard_copy_command 'xclip -in -selection clipboard'
if-shell 'command -v wl-copy >/dev/null 2>&1' \
  'set -g @clipboard_copy_command "wl-copy"'
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'set -g @clipboard_copy_command "pbcopy"'
bind -N "Copy selection" -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@clipboard_copy_command}"
bind -N "Copy selection" -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@clipboard_copy_command}"

bind -N "Toggle rectangle selection" -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -N "Select line" -T copy-mode-vi V send-keys -X select-line
bind -N "Clear selection" -T copy-mode-vi Escape send-keys -X clear-selection

## Show tree
bind -N "Choose session or window tree" -n M-a choose-tree
bind -N "Choose window tree" -n M-w choose-tree -w

## Session
bind -N "Create new session" -n M-C-c new-session
bind -N "Switch to next session" -n M-C-l switch-client -n
bind -N "Switch to previous session" -n M-C-h switch-client -p

## Window
bind -N "Create new window in current directory" c new-window -c "#{pane_current_path}"
bind -N "Go to next window" -r Tab  next-window
bind -N "Go to previous window" -r BTab previous-window
